
<!DOCTYPE html>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface font-body-md min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-background dark:bg-background flex justify-between items-center w-full px-container-margin-mobile md:px-container-margin-desktop py-4 sticky top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="bubble_chart">bubble_chart</span>
<h1 class="text-headline-md font-headline-md font-bold text-primary dark:text-on-primary-fixed">Oora</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high">

</div>
</header>
<main class="px-container-margin-mobile md:px-container-margin-desktop py-8 settings-container">

<section class="mb-12 flex flex-col items-center text-center">
<div class="relative mb-4">
<div class="w-24 h-24 rounded-full p-1 bg-gradient-to-tr from-secondary/20 to-secondary overflow-hidden ambient-glow">
<img alt="User profile photo" class="w-full h-full rounded-full object-cover border-2 border-white" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCc6gu1Tf01oSr17boVFPj9_n_fwnEBzWQcsU0TYxVmj0iR10SKNpHouYBb6wHbiLpBYT4qgwWIlUzFBTjRFTDg94Tmz4Hoz-h1QaAZHtD0C5ibmFfdLc7ec3yJodqMvFFRewYpTklaCsTa8kueTHvHQGzEgoWFAsjV3a_hV-AFzCCQi_fehQLlGAT4zatYBVtu9bWdCCoeNJShkpahhjwZHQsGSd2OfjdpfSaSeQhlq3APxTVvuN1FgySiWzx1uKUe82Z8_gzL9Bw4"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</button>
</div>
<h2 class="text-headline-lg-mobile md:text-headline-lg font-headline-lg text-primary mb-1">Alex Harrison</h2>
<p class="text-on-tertiary-container font-body-md">Primary Caregiver • Harrison Family</p>
</section>

<div class="space-y-4">
<!-- List Container -->
<div class="bg-surface-container-lowest rounded-xl overflow-hidden ambient-glow p-2">

<a class="list-item-hover group flex items-center justify-between p-4 rounded-lg transition-all duration-300" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="sensors">sensors</span>
</div>
<span class="text-body-lg font-semibold text-primary">Manage Devices</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</a>
<!-- Notification Preferences -->
<a class="list-item-hover group flex items-center justify-between p-4 rounded-lg transition-all duration-300" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</div>
<span class="text-body-lg font-semibold text-primary">Notification Preferences</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</a>
<!-- Family Sharing -->
<a class="list-item-hover group flex items-center justify-between p-4 rounded-lg transition-all duration-300" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="group">group</span>
</div>
<span class="text-body-lg font-semibold text-primary">Family Sharing</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</a>
<!-- Privacy & Security -->
<a class="list-item-hover group flex items-center justify-between p-4 rounded-lg transition-all duration-300" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
</div>
<span class="text-body-lg font-semibold text-primary">Privacy & Security</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</a>
<!-- Support -->
<a class="list-item-hover group flex items-center justify-between p-4 rounded-lg transition-all duration-300" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="help">help</span>
</div>
<span class="text-body-lg font-semibold text-primary">Support</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</a>
</div>

<button class="w-full py-4 px-6 rounded-xl text-error bg-error-container/20 font-bold flex items-center justify-center gap-2 hover:bg-error-container/40 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
          Log out
        </button>
</div>

<div class="text-center pt-8 pb-12">
<p class="text-label-sm font-label-sm text-on-tertiary-container uppercase tracking-widest">Oora App v2.4.0</p>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-surface-bright dark:bg-surface-container-lowest rounded-t-xl shadow-[0_-10px_40px_rgba(91,88,148,0.08)]">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-on-tertiary-container dark:text-outline-variant hover:text-primary transition-colors group">
<span class="material-symbols-outlined mb-1 group-active:scale-95 transition-transform" data-icon="grid_view">grid_view</span>
<span class="text-label-sm font-label-sm">Home</span>
</button>
<!-- Devices -->
<button class="flex flex-col items-center justify-center text-on-tertiary-container dark:text-outline-variant hover:text-primary transition-colors group">
<span class="material-symbols-outlined mb-1 group-active:scale-95 transition-transform" data-icon="sensors">sensors</span>
<span class="text-label-sm font-label-sm">Devices</span>
</button>
<!-- Insights -->
<button class="flex flex-col items-center justify-center text-on-tertiary-container dark:text-outline-variant hover:text-primary transition-colors group">
<span class="material-symbols-outlined mb-1 group-active:scale-95 transition-transform" data-icon="analytics">analytics</span>
<span class="text-label-sm font-label-sm">Insights</span>
</button>
<!-- Settings (ACTIVE) -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim font-bold bg-secondary-container/20 rounded-xl px-4 py-1 scale-95 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="text-label-sm font-label-sm">Settings</span>
</button>
</nav>
<script>
    // Micro-interactions for list items
    document.querySelectorAll('.list-item-hover').forEach(item => {
      item.addEventListener('touchstart', () => {
        item.style.backgroundColor = 'rgba(244, 243, 248, 1)';
      });
      item.addEventListener('touchend', () => {
        item.style.backgroundColor = '';
      });
    });
  </script>
</body></html>
